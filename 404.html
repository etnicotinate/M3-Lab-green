<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | M3-Lab</title>
  <style>
    :root {
      --bg: #101210;
      --panel: rgba(18, 22, 19, 0.78);
      --panel-border: rgba(255, 255, 255, 0.18);
      --text: #f5f7f0;
      --muted: rgba(245, 247, 240, 0.68);
      --brick: #f5f7f0;
      --accent: #9fdc8b;
      --danger: #ffcf70;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      background:
        radial-gradient(circle at 22% 18%, rgba(159, 220, 139, 0.18), transparent 32%),
        linear-gradient(135deg, #101210 0%, #151815 52%, #0b0d0b 100%);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      inset: 24px 24px auto;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
      pointer-events: none;
    }

    .title-block {
      max-width: 520px;
      pointer-events: auto;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 58px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .control-panel,
    .end-panel {
      width: min(360px, calc(100vw - 48px));
      padding: 16px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    #statusText {
      color: var(--text);
      font-weight: 700;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    button,
    .nav-link {
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    button:hover,
    .nav-link:hover {
      transform: translateY(-1px);
      color: #101210;
      background: var(--accent);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .mini-help {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .end-panel {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 3;
      display: none;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .end-panel[data-open="true"] {
      display: block;
    }

    .end-panel h2 {
      margin: 0 0 8px;
      font-size: 34px;
      letter-spacing: 0;
    }

    .end-panel p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .nav-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .screen-note {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 2;
      padding: 8px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(0, 0, 0, 0.26);
      font-size: 12px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    @media (max-width: 760px) {
      .hud {
        inset: 14px 14px auto;
        grid-template-columns: 1fr;
      }

      .title-block {
        max-width: none;
      }

      .control-panel {
        width: 100%;
      }

      .hint {
        display: none;
      }

      .screen-note {
        display: none;
      }
    }
  </style>
</head>

<body>
  <canvas id="brickBreaker" aria-label="Interactive brick breaker 404 game"></canvas>

  <div class="hud">
    <section class="title-block" aria-label="404 message">
      <p class="eyebrow">M3-Lab / page not found</p>
      <h2>The page you wanted is missing, <br>
        but the lab is still here</h2>
    </section>

    <section class="control-panel" aria-label="Game controls">
      <div class="status-row">
        <span>Status</span>
        <span id="statusText">Ready</span>
      </div>
      <div class="button-row">
        <button id="startButton" type="button">Start</button>
        <button id="pauseButton" type="button" disabled>Pause</button>
      </div>
      <label class="slider-label" for="speedRange">
        <span>Initial speed</span>
        <span><span id="speedValue">6</span> px/frame</span>
      </label>
      <input id="speedRange" type="range" min="1" max="5" value="6" step="1">
      <p class="mini-help">Arrow keys or A/D move the paddle. Space starts or pauses. R resets.</p>
    </section>
  </div>

  <section class="end-panel" id="endPanel" aria-live="polite">
    <h2 id="endTitle">404 cleared</h2>
    <p id="endText">Choose where to go next, or reset the wall and play again.</p>
    <button id="resetButton" type="button">Reset wall</button>
    <div class="nav-grid">
      <a class="nav-link" href="/">Back to Home</a>
      <a class="nav-link" href="/publication/">View Publications</a>
      <a class="nav-link" href="/joinUs/">JoinUs</a>
    </div>
  </section>

  <div class="screen-note" id="screenNote">Waiting for launch</div>

  <script>
    const canvas = document.getElementById("brickBreaker");
    const ctx = canvas.getContext("2d");
    const startButton = document.getElementById("startButton");
    const pauseButton = document.getElementById("pauseButton");
    const resetButton = document.getElementById("resetButton");
    const speedRange = document.getElementById("speedRange");
    const speedValue = document.getElementById("speedValue");
    const statusText = document.getElementById("statusText");
    const screenNote = document.getElementById("screenNote");
    const endPanel = document.getElementById("endPanel");
    const endTitle = document.getElementById("endTitle");
    const endText = document.getElementById("endText");

    const font = {
      "0": ["01110", "10001", "10011", "10101", "11001", "10001", "01110"],
      "3": ["11110", "00001", "00001", "01110", "00001", "00001", "11110"],
      "4": ["10010", "10010", "10010", "11111", "00010", "00010", "00010"],
      "A": ["01110", "10001", "10001", "11111", "10001", "10001", "10001"],
      "B": ["11110", "10001", "10001", "11110", "10001", "10001", "11110"],
      "E": ["11111", "10000", "10000", "11110", "10000", "10000", "11111"],
      "I": ["11111", "00100", "00100", "00100", "00100", "00100", "11111"],
      "L": ["10000", "10000", "10000", "10000", "10000", "10000", "11111"],
      "M": ["10001", "11011", "10101", "10101", "10001", "10001", "10001"],
      "T": ["11111", "00100", "00100", "00100", "00100", "00100", "00100"]
    };

    const textRows = ["404", "EIT", "M3 LAB"];
    const keys = { left: false, right: false };

    let width = 0;
    let height = 0;
    let bricks = [];
    let brickWidth = 34;
    let brickHeight = 16;
    let brickGap = 7;
    let ball = { x: 0, y: 0, dx: 0, dy: 0, radius: 9 };
    let paddle = { x: 0, y: 0, width: 120, height: 12, speed: 8 };
    let state = "ready";
    let animationId = null;

    function setCanvasSize() {
      const ratio = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * ratio);
      canvas.height = Math.floor(height * ratio);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function layoutBricks() {
      const longest = Math.max(...textRows.map(row => {
        return row.split("").reduce((sum, char) => sum + (char === " " ? 3 : 6), -1);
      }));
      const availableW = Math.min(width - 36, 860);
      const availableH = Math.max(210, height * 0.48);
      const cellW = Math.max(12, Math.floor(availableW / longest));
      const cellH = Math.max(10, Math.floor(availableH / 24));
      brickGap = Math.max(3, Math.floor(cellW * 0.18));
      brickWidth = cellW - brickGap;
      brickHeight = Math.max(8, cellH - brickGap);

      const rowPixelWidths = textRows.map(row => {
        return row.split("").reduce((sum, char) => sum + (char === " " ? 3 : 6), -1) * cellW + brickWidth;
      });
      const totalH = textRows.length * 7 * cellH + (textRows.length - 1) * cellH * 2;
      const baseY = Math.max(150, (height - totalH) * 0.48);

      bricks = [];
      textRows.forEach((row, rowIndex) => {
        let cursor = (width - rowPixelWidths[rowIndex]) / 2;
        const yOffset = baseY + rowIndex * 9 * cellH;

        row.split("").forEach(char => {
          if (char === " ") {
            cursor += 3 * cellW;
            return;
          }

          const glyph = font[char];
          glyph.forEach((line, gy) => {
            line.split("").forEach((dot, gx) => {
              if (dot === "1") {
                bricks.push({
                  x: cursor + gx * cellW,
                  y: yOffset + gy * cellH,
                  status: 1
                });
              }
            });
          });
          cursor += 6 * cellW;
        });
      });
    }

    function resetBallAndPaddle() {
      paddle.width = Math.max(92, Math.min(150, width * 0.16));
      paddle.height = 12;
      paddle.x = (width - paddle.width) / 2;
      paddle.y = height - 46;
      paddle.speed = Math.max(7, width * 0.008);
      ball.radius = Math.max(7, Math.min(10, width * 0.012));
      ball.x = width / 2;
      ball.y = paddle.y - ball.radius - 4;
      setBallVelocity(Number(speedRange.value));
    }

    function setBallVelocity(speed) {
      const direction = Math.random() > 0.5 ? 1 : -1;
      ball.dx = speed * 0.7 * direction;
      ball.dy = -speed;
    }

    function updateStatus(nextState) {
      state = nextState;
      const labels = {
        ready: "Ready",
        running: "Running",
        paused: "Paused",
        ended: "Finished"
      };
      statusText.textContent = labels[state];
      screenNote.textContent = state === "running" ? "Clear the dot-matrix bricks" : labels[state];
      startButton.textContent = state === "ended" ? "Restart" : "Start";
      pauseButton.textContent = state === "paused" ? "Resume" : "Pause";
      pauseButton.disabled = state === "ready" || state === "ended";
    }

    function drawRoundedRect(x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    function drawBackdrop() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "rgba(255, 255, 255, 0.035)";
      for (let x = 0; x < width; x += 42) {
        ctx.fillRect(x, 0, 1, height);
      }
      for (let y = 0; y < height; y += 42) {
        ctx.fillRect(0, y, width, 1);
      }
    }

    function drawBricks() {
      bricks.forEach(brick => {
        if (!brick.status) return;
        drawRoundedRect(brick.x, brick.y, brickWidth, brickHeight, 4);
        ctx.fillStyle = "rgba(245, 247, 240, 0.94)";
        ctx.fill();
        ctx.fillStyle = "rgba(159, 220, 139, 0.18)";
        ctx.fillRect(brick.x, brick.y, brickWidth, Math.max(2, brickHeight * 0.28));
      });
    }

    function drawPaddle() {
      drawRoundedRect(paddle.x, paddle.y, paddle.width, paddle.height, 6);
      ctx.fillStyle = "#9fdc8b";
      ctx.fill();
    }

    function drawBall() {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
      ctx.closePath();
    }

    function draw() {
      drawBackdrop();
      drawBricks();
      drawBall();
      drawPaddle();
    }

    function movePaddle() {
      if (keys.right) paddle.x += paddle.speed;
      if (keys.left) paddle.x -= paddle.speed;
      paddle.x = Math.max(0, Math.min(width - paddle.width, paddle.x));
    }

    function handleBrickCollision() {
      for (const brick of bricks) {
        if (!brick.status) continue;
        const hitX = ball.x + ball.radius > brick.x && ball.x - ball.radius < brick.x + brickWidth;
        const hitY = ball.y + ball.radius > brick.y && ball.y - ball.radius < brick.y + brickHeight;
        if (hitX && hitY) {
          brick.status = 0;
          ball.dy *= -1;
          return;
        }
      }
    }

    function endGame(won) {
      updateStatus("ended");
      cancelAnimationFrame(animationId);
      endTitle.textContent = won ? "404 cleared" : "Signal lost";
      endText.textContent = won ? "The dot-matrix wall is gone. Choose a destination." : "The ball slipped past the paddle. Reset the wall and try again.";
      endPanel.dataset.open = "true";
    }

    function step() {
      if (state !== "running") return;

      movePaddle();
      handleBrickCollision();

      if (ball.x + ball.dx > width - ball.radius || ball.x + ball.dx < ball.radius) {
        ball.dx *= -1;
      }
      if (ball.y + ball.dy < ball.radius) {
        ball.dy *= -1;
      } else if (ball.y + ball.dy > paddle.y - ball.radius) {
        const withinPaddle = ball.x > paddle.x && ball.x < paddle.x + paddle.width && ball.y < paddle.y + paddle.height;
        if (withinPaddle) {
          const offset = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
          const speed = Math.hypot(ball.dx, ball.dy);
          ball.dx = speed * 0.72 * offset;
          ball.dy = -Math.max(3, Math.sqrt(Math.max(0, speed * speed - ball.dx * ball.dx)));
        } else if (ball.y > height + ball.radius) {
          endGame(false);
          return;
        }
      }

      ball.x += ball.dx;
      ball.y += ball.dy;

      if (bricks.every(brick => brick.status === 0)) {
        endGame(true);
        draw();
        return;
      }

      draw();
      animationId = requestAnimationFrame(step);
    }

    function startGame() {
      if (state === "running") return;
      if (state === "ended") resetGame();
      updateStatus("running");
      endPanel.dataset.open = "false";
      cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(step);
    }

    function togglePause() {
      if (state === "running") {
        updateStatus("paused");
        cancelAnimationFrame(animationId);
        draw();
        return;
      }
      if (state === "paused") {
        startGame();
      }
    }

    function resetGame() {
      cancelAnimationFrame(animationId);
      layoutBricks();
      resetBallAndPaddle();
      endPanel.dataset.open = "false";
      updateStatus("ready");
      draw();
    }

    function handleResize() {
      setCanvasSize();
      resetGame();
    }

    document.addEventListener("keydown", event => {
      if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") keys.right = true;
      if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") keys.left = true;
      if (event.code === "Space") {
        event.preventDefault();
        state === "running" ? togglePause() : startGame();
      }
      if (event.key.toLowerCase() === "r") resetGame();
    });

    document.addEventListener("keyup", event => {
      if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") keys.right = false;
      if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") keys.left = false;
    });

    startButton.addEventListener("click", startGame);
    pauseButton.addEventListener("click", togglePause);
    resetButton.addEventListener("click", resetGame);
    speedRange.addEventListener("input", () => {
      speedValue.textContent = speedRange.value;
      if (state === "ready") setBallVelocity(Number(speedRange.value));
    });
    window.addEventListener("resize", handleResize);

    setCanvasSize();
    resetGame();
  </script>
</body>

</html>
